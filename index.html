<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#000000" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Pulse" />
<meta name="mobile-web-app-capable" content="yes" />
<title>Pulse</title>
<link rel="manifest" href="./manifest.json" />
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20180%20180'%3E%3Crect%20width='180'%20height='180'%20rx='40'%20fill='%23000'/%3E%3Cg%20fill='%23F5B942'%3E%3Crect%20x='28'%20y='86'%20width='20'%20height='8'/%3E%3Crect%20x='48'%20y='86'%20width='12'%20height='8'/%3E%3Crect%20x='60'%20y='62'%20width='12'%20height='56'/%3E%3Crect%20x='72'%20y='38'%20width='12'%20height='104'/%3E%3Crect%20x='84'%20y='70'%20width='12'%20height='40'/%3E%3Crect%20x='96'%20y='86'%20width='12'%20height='8'/%3E%3Crect%20x='108'%20y='54'%20width='12'%20height='72'/%3E%3Crect%20x='120'%20y='86'%20width='12'%20height='8'/%3E%3Crect%20x='132'%20y='86'%20width='20'%20height='8'/%3E%3C/g%3E%3C/svg%3E" />
<style>
  :root {
    --bg: #000000;
    --surface: #0b0b0c;
    --surface-2: #141416;
    --hairline: rgba(255,255,255,0.07);
    --hairline-strong: rgba(255,255,255,0.12);
    --text: #f5f5f7;
    --text-dim: #98989f;
    --text-faint: #636367;
    --amber: #f5b942;
    --amber-dim: #b07d2a;
    --expense: #6b7280;
    --radius: 22px;
    --radius-sm: 14px;
    --ease: cubic-bezier(0.22, 1, 0.36, 1);
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    overscroll-behavior: none;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Segoe UI", Roboto, system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    min-height: 100vh;
    min-height: 100dvh;
    overflow-x: hidden;
    overscroll-behavior: none;
    -webkit-user-select: none;
    user-select: none;
  }

  #root {
    min-height: 100vh;
    min-height: 100dvh;
    padding:
      calc(env(safe-area-inset-top) + 26px)
      calc(env(safe-area-inset-right) + 18px)
      calc(env(safe-area-inset-bottom) + 28px)
      calc(env(safe-area-inset-left) + 18px);
  }

  .wrap { width: 100%; max-width: 1080px; margin: 0 auto; }

  /* ---------- Header / clock ---------- */
  .greeting {
    font-size: 15px;
    font-weight: 500;
    color: var(--amber);
    letter-spacing: 0.2px;
    margin: 0 0 6px 2px;
    opacity: 0;
    animation: rise 0.6s var(--ease) 0.05s forwards;
  }
  .clock {
    font-size: clamp(64px, 18vw, 132px);
    font-weight: 300;
    line-height: 0.92;
    letter-spacing: -0.04em;
    font-variant-numeric: tabular-nums;
    margin: 0 0 4px -4px;
    opacity: 0;
    animation: rise 0.6s var(--ease) 0.1s forwards;
  }
  .clock .ampm {
    font-size: 0.3em;
    font-weight: 500;
    color: var(--text-dim);
    letter-spacing: 0;
    margin-left: 0.15em;
    vertical-align: 0.4em;
  }
  .datel {
    font-size: 17px;
    font-weight: 500;
    color: var(--text-dim);
    margin: 0 0 0 2px;
    letter-spacing: 0.2px;
    opacity: 0;
    animation: rise 0.6s var(--ease) 0.15s forwards;
  }

  /* ---------- Layout grid ---------- */
  .grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 14px;
    margin-top: 26px;
  }
  .card {
    background: var(--surface);
    border: 1px solid var(--hairline);
    border-radius: var(--radius);
    padding: 20px;
    opacity: 0;
    animation: rise 0.6s var(--ease) 0.2s forwards;
  }
  .card.delay2 { animation-delay: 0.26s; }
  .card.delay3 { animation-delay: 0.32s; }

  .card-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }
  .card-title {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-faint);
    margin: 0;
  }

  /* ---------- Weather ---------- */
  .weather-row { display: flex; align-items: center; gap: 18px; }
  .weather-icon { flex-shrink: 0; width: 72px; height: 72px; }
  .weather-temp { font-size: 52px; font-weight: 300; line-height: 1; letter-spacing: -0.03em; font-variant-numeric: tabular-nums; }
  .weather-cond { font-size: 16px; font-weight: 500; color: var(--text-dim); margin-top: 4px; }
  .weather-meta { display: flex; gap: 18px; margin-top: 16px; flex-wrap: wrap; }
  .weather-meta div { font-size: 13px; color: var(--text-faint); }
  .weather-meta b { color: var(--text-dim); font-weight: 600; }
  .weather-loading, .weather-error { color: var(--text-faint); font-size: 14px; padding: 8px 0; }
  .weather-error { color: var(--expense); }
  .retry {
    margin-top: 10px; background: var(--surface-2); border: 1px solid var(--hairline);
    color: var(--amber); font-size: 13px; font-weight: 600; padding: 8px 14px;
    border-radius: 999px; cursor: pointer; transition: transform 0.15s var(--ease);
  }
  .retry:active { transform: scale(0.95); }

  /* ---------- Projects ---------- */
  .proj-list { display: flex; flex-direction: column; gap: 8px; }
  .proj {
    display: flex; align-items: center; gap: 14px;
    background: var(--surface-2); border: 1px solid transparent;
    border-radius: var(--radius-sm); padding: 14px 16px;
    text-decoration: none; color: var(--text);
    transition: transform 0.16s var(--ease), border-color 0.16s var(--ease), background 0.16s var(--ease);
  }
  .proj:active { transform: scale(0.985); background: #1b1b1e; }
  @media (hover: hover) { .proj:hover { border-color: var(--hairline-strong); } }
  .proj-dot { width: 9px; height: 9px; border-radius: 50%; background: var(--amber); flex-shrink: 0; }
  .proj-dot.dev { background: var(--text-faint); }
  .proj-name { font-size: 16px; font-weight: 600; flex: 1; }
  .proj-ver {
    font-size: 12px; font-weight: 600; color: var(--amber);
    background: rgba(245,185,66,0.1); padding: 4px 10px; border-radius: 999px;
    font-variant-numeric: tabular-nums;
  }
  .proj-ver.dev { color: var(--text-dim); background: var(--surface); }
  .proj-arrow { color: var(--text-faint); font-size: 18px; line-height: 1; }

  /* edit mode */
  .proj-edit { display: flex; flex-direction: column; gap: 8px; background: var(--surface-2); border-radius: var(--radius-sm); padding: 12px; }
  .proj-edit-row { display: flex; gap: 8px; }
  .inp {
    width: 100%; background: var(--bg); border: 1px solid var(--hairline);
    border-radius: 10px; color: var(--text); font-size: 14px; padding: 10px 12px;
    font-family: inherit; outline: none; transition: border-color 0.15s var(--ease);
    -webkit-user-select: text; user-select: text;
  }
  .inp:focus { border-color: var(--amber-dim); }
  .inp.ver { max-width: 96px; text-align: center; }
  .icon-btn {
    background: var(--surface-2); border: 1px solid var(--hairline); color: var(--text-dim);
    width: 34px; height: 34px; border-radius: 999px; cursor: pointer; font-size: 14px;
    display: inline-flex; align-items: center; justify-content: center;
    transition: transform 0.15s var(--ease), color 0.15s var(--ease);
    flex-shrink: 0; padding: 0;
  }
  .icon-btn:active { transform: scale(0.9); }
  .icon-btn.active { color: var(--amber); border-color: var(--amber-dim); }
  .del-btn { color: var(--expense); border-color: transparent; }
  .add-proj {
    background: transparent; border: 1px dashed var(--hairline-strong); color: var(--text-dim);
    border-radius: var(--radius-sm); padding: 12px; font-size: 14px; font-weight: 600;
    cursor: pointer; font-family: inherit; transition: transform 0.15s var(--ease), color 0.15s var(--ease);
  }
  .add-proj:active { transform: scale(0.98); color: var(--amber); }

  /* ---------- Note ---------- */
  .note {
    width: 100%; resize: none; overflow-y: auto;
    background: transparent; border: none; outline: none;
    color: var(--text); font-size: 16px; line-height: 1.55;
    font-family: inherit; padding: 0;
    -webkit-user-select: text; user-select: text;
  }
  .note::placeholder { color: var(--text-faint); }
  .note-status { font-size: 11px; color: var(--text-faint); font-weight: 600; letter-spacing: 0.04em; transition: opacity 0.4s; }
  .note-status.saved { color: var(--amber-dim); }
  .note-resize {
    display: flex; align-items: center; justify-content: center;
    height: 24px; margin: 8px -20px -8px; cursor: ns-resize;
    touch-action: none;
    -webkit-user-select: none; user-select: none;
  }
  .note-resize span {
    width: 38px; height: 4px; border-radius: 999px;
    background: var(--hairline-strong);
    transition: background 0.15s var(--ease), width 0.15s var(--ease);
  }
  .note-resize:active span { background: var(--amber-dim); width: 52px; }
  @media (hover: hover) { .note-resize:hover span { background: var(--text-faint); } }

  /* ---------- Version badge ---------- */
  .ver-badge {
    position: fixed;
    bottom: calc(env(safe-area-inset-bottom) + 8px);
    right: calc(env(safe-area-inset-right) + 10px);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.04em;
    color: var(--text-dim);
    background: var(--surface-2);
    border: 1px solid var(--hairline);
    padding: 4px 9px;
    border-radius: 999px;
    font-variant-numeric: tabular-nums;
    z-index: 50;
    pointer-events: none;
    -webkit-user-select: none;
    user-select: none;
  }

  /* ---------- Desktop ---------- */
  @media (min-width: 760px) {
    #root { padding-top: calc(env(safe-area-inset-top) + 56px); }
    .grid { grid-template-columns: 1fr 1fr; gap: 16px; }
    .card.weather-card { grid-column: 1 / -1; }
    .weather-card .weather-row { gap: 24px; }
  }
  @media (min-width: 980px) {
    .grid { grid-template-columns: 1.2fr 1fr 1fr; }
    .card.weather-card { grid-column: auto; }
    .card.note-card { grid-column: 2 / -1; }
  }

  @keyframes rise {
    from { opacity: 0; transform: translateY(14px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @media (prefers-reduced-motion: reduce) {
    * { animation: none !important; transition: none !important; }
    .greeting, .clock, .datel, .card { opacity: 1 !important; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script>
const VERSION = "1.0.3";

(function () {
  "use strict";
  const { useState, useEffect, useRef, useCallback } = React;
  const e = React.createElement;

  // ---- Location: Gilroy, California ----
  const LAT = 37.0058, LON = -121.5683;
  const WEATHER_URL =
    "https://api.open-meteo.com/v1/forecast?latitude=" + LAT + "&longitude=" + LON +
    "&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m" +
    "&temperature_unit=fahrenheit&wind_speed_unit=mph&timezone=America%2FLos_Angeles";

  const LS_PROJECTS = "pulse_projects_v1";
  const LS_NOTE = "pulse_note_v1";
  const LS_NOTE_H = "pulse_note_h_v1";

  const DEFAULT_PROJECTS = [
    { id: "fluxbucks", name: "FluxBucks", url: "https://livescreate.github.io/FluxBucks-Game/", ver: "5.3.9" },
    { id: "hustlebox", name: "HustleBox", url: "https://livescreate.github.io/HustleBox/", ver: "1.3.6" },
    { id: "deck", name: "Deck", url: "https://livescreate.github.io/Deck/", ver: "2.5.0" },
    { id: "td", name: "Tower Defense", url: "", ver: "dev" }
  ];

  // ---- localStorage helpers ----
  function loadJSON(key, fallback) {
    try {
      const raw = localStorage.getItem(key);
      return raw ? JSON.parse(raw) : fallback;
    } catch (err) { return fallback; }
  }
  function saveJSON(key, value) {
    try { localStorage.setItem(key, JSON.stringify(value)); } catch (err) {}
  }

  // ---- Pixel-art icon renderer ----
  // map: array of strings; palette: { char: color }; ' ' = transparent
  function pixel(map, palette, size) {
    const rows = map.length, cols = map[0].length;
    const dim = size || 64;
    const cw = dim / cols, ch = dim / rows;
    const rects = [];
    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        const ch0 = map[r][c];
        const color = palette[ch0];
        if (!color) continue;
        rects.push(e("rect", {
          key: r + "-" + c,
          x: (c * cw).toFixed(2), y: (r * ch).toFixed(2),
          width: Math.ceil(cw) + 0.5, height: Math.ceil(ch) + 0.5,
          fill: color
        }));
      }
    }
    return e("svg", {
      className: "weather-icon", viewBox: "0 0 " + dim + " " + dim,
      xmlns: "http://www.w3.org/2000/svg", "aria-hidden": "true"
    }, rects);
  }

  const C_SUN = "#f5b942", C_RAY = "#b07d2a", C_CLOUD = "#9aa0a6",
        C_CLOUD_D = "#5f6368", C_RAIN = "#5b8def", C_SNOW = "#e8eaed", C_BOLT = "#f5b942";

  const ART = {
    sun: { map: [
      "  .  .  ",
      ". #### .",
      " ###### ",
      ".######.",
      ".######.",
      " ###### ",
      ". #### .",
      "  .  .  "
    ], pal: { "#": C_SUN, ".": C_RAY } },
    cloud: { map: [
      "        ",
      "  ###   ",
      " #####  ",
      "########",
      "########",
      " ###### ",
      "        ",
      "        "
    ], pal: { "#": C_CLOUD } },
    partly: { map: [
      " ##     ",
      "####    ",
      " ## ### ",
      "  ##### ",
      " ###### ",
      "########",
      " ###### ",
      "        "
    ], pal: { "#": C_CLOUD, "@": C_SUN } },
    rain: { map: [
      "  ###   ",
      " #####  ",
      "########",
      " ###### ",
      "        ",
      " ~  ~  ~",
      "~  ~  ~ ",
      "        "
    ], pal: { "#": C_CLOUD, "~": C_RAIN } },
    snow: { map: [
      "  ###   ",
      " #####  ",
      "########",
      " ###### ",
      "        ",
      " *  *  *",
      "*  *  * ",
      "        "
    ], pal: { "#": C_CLOUD, "*": C_SNOW } },
    fog: { map: [
      "        ",
      "########",
      "        ",
      "########",
      "        ",
      "########",
      "        ",
      "########"
    ], pal: { "#": C_CLOUD_D } },
    thunder: { map: [
      "  ###   ",
      " #####  ",
      "########",
      "   !!   ",
      "  !!    ",
      " !!!!   ",
      "  !!    ",
      " !      "
    ], pal: { "#": C_CLOUD, "!": C_BOLT } }
  };

  function codeInfo(code) {
    if (code === 0) return { label: "Clear", art: "sun" };
    if (code === 1) return { label: "Mostly Clear", art: "partly" };
    if (code === 2) return { label: "Partly Cloudy", art: "partly" };
    if (code === 3) return { label: "Overcast", art: "cloud" };
    if (code === 45 || code === 48) return { label: "Fog", art: "fog" };
    if (code >= 51 && code <= 57) return { label: "Drizzle", art: "rain" };
    if (code >= 61 && code <= 67) return { label: "Rain", art: "rain" };
    if (code >= 71 && code <= 77) return { label: "Snow", art: "snow" };
    if (code >= 80 && code <= 82) return { label: "Showers", art: "rain" };
    if (code === 85 || code === 86) return { label: "Snow Showers", art: "snow" };
    if (code >= 95) return { label: "Thunderstorm", art: "thunder" };
    return { label: "—", art: "cloud" };
  }

  // ---- Clock ----
  function Clock() {
    const [now, setNow] = useState(new Date());
    useEffect(function () {
      const t = setInterval(function () { setNow(new Date()); }, 1000);
      return function () { clearInterval(t); };
    }, []);

    const h = now.getHours();
    let greeting = "Good evening";
    if (h < 5) greeting = "Late night";
    else if (h < 12) greeting = "Good morning";
    else if (h < 18) greeting = "Good afternoon";

    let hr = h % 12; if (hr === 0) hr = 12;
    const min = String(now.getMinutes()).padStart(2, "0");
    const ampm = h < 12 ? "AM" : "PM";
    const dateStr = now.toLocaleDateString(undefined, {
      weekday: "long", month: "long", day: "numeric"
    });

    return e("header", null,
      e("p", { className: "greeting" }, greeting),
      e("h1", { className: "clock" }, hr + ":" + min, e("span", { className: "ampm" }, ampm)),
      e("p", { className: "datel" }, dateStr)
    );
  }

  // ---- Weather ----
  function Weather() {
    const [state, setState] = useState({ status: "loading", data: null });

    const fetchWeather = useCallback(function () {
      setState(function (s) { return { status: "loading", data: s.data }; });
      fetch(WEATHER_URL, { cache: "no-store" })
        .then(function (r) { if (!r.ok) throw new Error("bad"); return r.json(); })
        .then(function (j) {
          if (!j || !j.current) throw new Error("nodata");
          setState({ status: "ok", data: j.current });
        })
        .catch(function () {
          setState(function (s) { return { status: s.data ? "ok" : "error", data: s.data }; });
        });
    }, []);

    useEffect(function () {
      fetchWeather();
      const t = setInterval(fetchWeather, 15 * 60 * 1000);
      return function () { clearInterval(t); };
    }, [fetchWeather]);

    let body;
    if (state.status === "loading" && !state.data) {
      body = e("div", { className: "weather-loading" }, "Loading weather…");
    } else if (state.status === "error") {
      body = e("div", null,
        e("div", { className: "weather-error" }, "Couldn't reach the weather service."),
        e("button", { className: "retry", onClick: fetchWeather }, "Retry")
      );
    } else {
      const d = state.data;
      const info = codeInfo(d.weather_code);
      const art = ART[info.art];
      body = e("div", null,
        e("div", { className: "weather-row" },
          pixel(art.map, art.pal, 72),
          e("div", null,
            e("div", { className: "weather-temp" }, Math.round(d.temperature_2m) + "°"),
            e("div", { className: "weather-cond" }, info.label)
          )
        ),
        e("div", { className: "weather-meta" },
          e("div", null, "Feels ", e("b", null, Math.round(d.apparent_temperature) + "°")),
          e("div", null, "Humidity ", e("b", null, Math.round(d.relative_humidity_2m) + "%")),
          e("div", null, "Wind ", e("b", null, Math.round(d.wind_speed_10m) + " mph"))
        )
      );
    }

    return e("section", { className: "card weather-card" },
      e("div", { className: "card-head" },
        e("p", { className: "card-title" }, "Gilroy, CA"),
        e("button", {
          className: "icon-btn", onClick: fetchWeather, title: "Refresh weather", "aria-label": "Refresh weather"
        }, "↻")
      ),
      body
    );
  }

  // ---- Projects ----
  function Projects() {
    const [projects, setProjects] = useState(function () { return loadJSON(LS_PROJECTS, DEFAULT_PROJECTS); });
    const [editing, setEditing] = useState(false);

    useEffect(function () { saveJSON(LS_PROJECTS, projects); }, [projects]);

    function update(id, field, value) {
      setProjects(projects.map(function (p) {
        return p.id === id ? Object.assign({}, p, { [field]: value }) : p;
      }));
    }
    function remove(id) { setProjects(projects.filter(function (p) { return p.id !== id; })); }
    function add() {
      setProjects(projects.concat([{ id: "p" + Date.now(), name: "New Project", url: "", ver: "1.0.0" }]));
    }

    const items = projects.map(function (p) {
      const isDev = !p.ver || p.ver.toLowerCase() === "dev";
      if (editing) {
        return e("div", { key: p.id, className: "proj-edit" },
          e("div", { className: "proj-edit-row" },
            e("input", {
              className: "inp", value: p.name, placeholder: "Name",
              onChange: function (ev) { update(p.id, "name", ev.target.value); }
            }),
            e("input", {
              className: "inp ver", value: p.ver, placeholder: "ver",
              onChange: function (ev) { update(p.id, "ver", ev.target.value); }
            }),
            e("button", { className: "icon-btn del-btn", onClick: function () { remove(p.id); }, "aria-label": "Remove" }, "✕")
          ),
          e("input", {
            className: "inp", value: p.url, placeholder: "https://… (leave blank if not live yet)",
            onChange: function (ev) { update(p.id, "url", ev.target.value); }
          })
        );
      }
      const hasUrl = p.url && p.url.trim().length > 0;
      const inner = [
        e("span", { className: "proj-dot" + (isDev ? " dev" : ""), key: "dot" }),
        e("span", { className: "proj-name", key: "name" }, p.name),
        e("span", { className: "proj-ver" + (isDev ? " dev" : ""), key: "ver" }, isDev ? "dev" : "v" + p.ver),
        hasUrl ? e("span", { className: "proj-arrow", key: "arr" }, "›") : null
      ];
      return hasUrl
        ? e("a", { key: p.id, className: "proj", href: p.url, target: "_blank", rel: "noopener noreferrer" }, inner)
        : e("div", { key: p.id, className: "proj", style: { opacity: 0.55, cursor: "default" } }, inner);
    });

    return e("section", { className: "card delay2" },
      e("div", { className: "card-head" },
        e("p", { className: "card-title" }, "Projects"),
        e("button", {
          className: "icon-btn" + (editing ? " active" : ""),
          onClick: function () { setEditing(!editing); },
          title: editing ? "Done" : "Edit projects", "aria-label": "Edit projects"
        }, editing ? "✓" : "✎")
      ),
      e("div", { className: "proj-list" },
        items,
        editing ? e("button", { className: "add-proj", onClick: add }, "+ Add project") : null
      )
    );
  }

  // ---- Scratch note ----
  var NOTE_MIN = 90, NOTE_MAX = 480;
  function Note() {
    const [text, setText] = useState(function () { return loadJSON(LS_NOTE, ""); });
    const [saved, setSaved] = useState(true);
    const [height, setHeight] = useState(function () {
      var h = loadJSON(LS_NOTE_H, 150);
      if (typeof h !== "number") h = 150;
      return Math.max(NOTE_MIN, Math.min(NOTE_MAX, h));
    });
    const timer = useRef(null);
    const drag = useRef(null);

    function onChange(ev) {
      const v = ev.target.value;
      setText(v);
      setSaved(false);
      if (timer.current) clearTimeout(timer.current);
      timer.current = setTimeout(function () {
        saveJSON(LS_NOTE, v);
        setSaved(true);
      }, 500);
    }

    function onPointerDown(ev) {
      ev.preventDefault();
      drag.current = { startY: ev.clientY, startH: height, latest: height };
      try { ev.currentTarget.setPointerCapture(ev.pointerId); } catch (e2) {}
    }
    function onPointerMove(ev) {
      if (!drag.current) return;
      var h = drag.current.startH + (ev.clientY - drag.current.startY);
      h = Math.max(NOTE_MIN, Math.min(NOTE_MAX, h));
      drag.current.latest = h;
      setHeight(h);
    }
    function endDrag() {
      if (!drag.current) return;
      var h = drag.current.latest;
      drag.current = null;
      saveJSON(LS_NOTE_H, h);
    }

    useEffect(function () {
      return function () { if (timer.current) clearTimeout(timer.current); };
    }, []);

    return e("section", { className: "card note-card delay3" },
      e("div", { className: "card-head" },
        e("p", { className: "card-title" }, "Scratch"),
        e("span", { className: "note-status" + (saved ? " saved" : "") }, saved ? "Saved" : "Saving…")
      ),
      e("textarea", {
        className: "note", value: text, onChange: onChange,
        style: { height: height + "px" },
        placeholder: "Jot something down… saves automatically.",
        spellCheck: false
      }),
      e("div", {
        className: "note-resize",
        onPointerDown: onPointerDown,
        onPointerMove: onPointerMove,
        onPointerUp: endDrag,
        onPointerCancel: endDrag,
        title: "Drag to resize",
        "aria-label": "Drag to resize the scratch area"
      }, e("span", null))
    );
  }

  function App() {
    return e("div", { className: "wrap" },
      e(Clock),
      e("div", { className: "grid" },
        e(Weather),
        e(Projects),
        e(Note)
      ),
      e("div", { className: "ver-badge" }, "v" + VERSION)
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(e(App));

  // ---- Service worker ----
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", function () {
      navigator.serviceWorker.register("./sw.js").catch(function () {});
    });
  }
})();
</script>
</body>
</html>
